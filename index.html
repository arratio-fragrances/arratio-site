<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Arratio — Coming Soon</title>

  <meta
    name="description"
    content="Arratio is an independent fragrance house creating compositions crafted to be remembered."
  >

  <style>
    :root {
      --background: #f4f1eb;
      --text: #171717;
      --muted: #66625d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: var(--background);
      color: var(--text);
      font-family: Baskerville, "Baskerville Old Face",
        "Times New Roman", serif;
    }

    main {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 5rem);
      font-weight: 500;
      letter-spacing: 0.22em;
      text-indent: 0.22em;
    }

    .tagline {
      margin: 34px 0 0;
      font-size: clamp(1rem, 2.4vw, 1.3rem);
      letter-spacing: 0.08em;
    }

    .description {
      max-width: 540px;
      margin: 22px auto 0;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .status {
      margin-top: 44px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .links {
      margin-top: 38px;
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid transparent;
      padding-bottom: 4px;
    }

    .links a:hover,
    .links a:focus {
      border-bottom-color: var(--text);
    }

    footer {
      margin-top: 70px;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
    }
  </style>
</head>

<body>
  <main>
    <h1>ARRATIO</h1>

    <p class="tagline">Crafted to be remembered.</p>

    <p class="description">
      An independent fragrance house creating compositions
      defined by character, craftsmanship, and lasting impression.
    </p>

    <p class="status">Launching soon</p>

    <nav class="links" aria-label="Social links">
      <a
        href="https://www.instagram.com/arratio.fragrances/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Instagram
      </a>

      <a href="mailto:arratio.brand@gmail.com">
        Contact
      </a>
    </nav>

    <footer>
      © 2026 Arratio
    </footer>
  </main>
</body>
</html>
