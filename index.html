<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Arratio — Coming Soon</title>

  <meta
    name="description"
    content="Arratio is an independent fragrance house creating timeless compositions defined by craftsmanship, character, and lasting impression."
  >

  <style>
    :root {
      --background: #f4f1eb;
      --text: #171717;
      --muted: #66625d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: var(--background);
      color: var(--text);
      font-family: Baskerville, "Baskerville Old Face",
        "Times New Roman", serif;
    }

    main {
      width: 100%;
      max-width: 760px;
      text-align: center;
      transform: translateY(-30px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5.8vw, 3.7rem);
      font-weight: 500;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      animation: fadeUp 0.8s ease-out both;
    }

    .tagline {
      margin: 28px 0 0;
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      letter-spacing: 0.08em;
      animation: fadeUp 0.8s ease-out 0.12s both;
    }

    .description {
      max-width: 470px;
      margin: 20px auto 0;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.95rem;
      line-height: 1.7;
      animation: fadeUp 0.8s ease-out 0.24s both;
    }

    .status {
      margin-top: 36px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      animation: fadeUp 0.8s ease-out 0.36s both;
    }

    .links {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 26px;
      flex-wrap: wrap;
      animation: fadeUp 0.8s ease-out 0.48s both;
    }

    .links a {
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid transparent;
      padding-bottom: 4px;
      transition:
        border-color 0.2s ease,
        opacity 0.2s ease;
    }

    .links a:hover,
    .links a:focus {
      border-bottom-color: var(--text);
      opacity: 0.7;
    }

    footer {
      margin-top: 56px;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      animation: fadeUp 0.8s ease-out 0.6s both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 24px;
      }

      main {
        transform: translateY(-10px);
      }

      h1 {
        font-size: clamp(2rem, 13vw, 3.2rem);
        letter-spacing: 0.15em;
        text-indent: 0.15em;
      }

      .description {
        font-size: 0.9rem;
      }

      footer {
        margin-top: 46px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      h1,
      .tagline,
      .description,
      .status,
      .links,
      footer {
        animation: none;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>ARRATIO</h1>

    <p class="tagline">
      Crafted to be remembered.
    </p>

    <p class="description">
      An independent fragrance house creating timeless compositions crafted to leave a lasting impression.
    </p>

    <p class="status">
      Launching soon
    </p>

    <nav class="links" aria-label="Social links">
      <a
        href="https://www.instagram.com/arratio.fragrances/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Instagram
      </a>

      <a href="mailto:arratio.brand@gmail.com">
        Contact
      </a>
    </nav>

    <footer>
      © 2026 Arratio
    </footer>
  </main>
</body>
</html>
